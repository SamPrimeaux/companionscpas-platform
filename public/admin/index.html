<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Companions of CPAS Admin Login</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;font-family:Inter,Arial,sans-serif;background:#fff7f8;color:#172033}
    .card{width:min(420px,92vw);background:white;border:1px solid #f1d6dc;border-radius:24px;box-shadow:0 18px 50px rgba(231,37,53,.12);padding:32px}
    img{width:92px;height:92px;object-fit:contain;display:block;margin:0 auto 18px}
    h1{text-align:center;margin:0 0 8px;font-size:26px}
    p{text-align:center;color:#60718f;margin:0 0 24px}
    label{display:block;font-weight:700;margin:14px 0 6px}
    input{width:100%;box-sizing:border-box;border:1px solid #f1d6dc;border-radius:14px;padding:14px;font-size:16px}
    button{width:100%;margin-top:20px;border:0;border-radius:14px;padding:14px 16px;background:#e72535;color:white;font-weight:800;font-size:16px;cursor:pointer}
    .error{display:none;margin-top:14px;color:#b91625;background:#fff1f2;border:1px solid #fecdd3;border-radius:12px;padding:10px}
  </style>
</head>
<body>
  <main class="card">
    <img src="/logo.png" alt="Companions of CPAS logo">
    <h1>Admin Login</h1>
    <p>Sign in to manage animals, applications, donations, and updates.</p>

    <form id="loginForm">
      <label>Email</label>
      <input name="email" type="email" autocomplete="email" required>

      <label>Password</label>
      <input name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Sign In</button>
      <div id="error" class="error"></div>
    </form>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorBox = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorBox.style.display = 'none';

      const body = {
        email: form.email.value.trim(),
        password: form.password.value
      };

      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify(body)
      });

      if (!res.ok) {
        let msg = 'Login failed. Check email/password.';
        try { msg = (await res.json()).error || msg; } catch {}
        errorBox.textContent = msg;
        errorBox.style.display = 'block';
        return;
      }

      window.location.href = '/dashboard';
    });
  </script>
</body>
</html>
