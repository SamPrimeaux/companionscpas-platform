<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Companions of CPAS Dashboard</title>
<style>
:root{--bg:#fff7fa;--panel:#fff;--ink:#172033;--muted:#667594;--red:#ee2336;--pink:#ffe9ee;--line:#f1d2da;--blue:#2563eb;--green:#10b981;--orange:#f59e0b;--purple:#8b5cf6;--shadow:0 22px 70px rgba(238,35,54,.13)}
*{box-sizing:border-box}body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(135deg,#fff,#fff4f7);color:var(--ink)}.app{display:grid;grid-template-columns:260px 1fr;min-height:100vh}.side{background:#fff;border-right:1px solid var(--line);padding:20px;position:sticky;top:0;height:100vh}.brand{display:flex;align-items:center;gap:12px;margin-bottom:28px}.brand img{width:54px;height:54px;object-fit:contain}.brand b{font-size:15px}.nav a{display:flex;gap:10px;align-items:center;padding:13px 14px;border-radius:16px;text-decoration:none;color:var(--muted);font-weight:800;margin:4px 0}.nav a.active,.nav a:hover{background:var(--pink);color:var(--red)}.main{padding:28px 34px}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.top h1{font-size:38px;margin:0}.pill{background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 14px;color:var(--muted);font-weight:800}.grid{display:grid;gap:18px}.kpis{grid-template-columns:repeat(4,minmax(0,1fr))}.card{background:rgba(255,255,255,.92);border:1px solid var(--line);border-radius:24px;box-shadow:var(--shadow);padding:22px}.kpi b{font-size:34px}.kpi span{display:block;color:var(--muted);font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-weight:900;margin-top:8px}.two{grid-template-columns:1.25fr .75fr}.three{grid-template-columns:repeat(3,1fr)}.chart{height:260px;display:flex;align-items:end;gap:10px;border-top:1px solid #f3e1e6;padding-top:30px}.bar{flex:1;border-radius:14px 14px 6px 6px;background:linear-gradient(180deg,var(--red),#ff8a00);min-height:30px}.linechart{height:260px;background:linear-gradient(180deg,#fff,#fff6f8);border-radius:18px;padding:18px}.row{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f2e1e6;padding:14px 0}.tag{padding:7px 10px;border-radius:999px;background:#eef2ff;color:#3154b8;font-size:12px;font-weight:900}.btn{border:0;border-radius:14px;padding:12px 16px;background:linear-gradient(135deg,var(--red),#ff8a00);color:white;font-weight:900;cursor:pointer}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}.table{width:100%;border-collapse:collapse}.table th,.table td{text-align:left;border-bottom:1px solid #f0dfe4;padding:14px}.table th{font-size:12px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted)}.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}.day{background:#fff;border:1px solid var(--line);border-radius:16px;min-height:86px;padding:10px}.event{font-size:11px;background:var(--pink);color:var(--red);border-radius:999px;padding:5px;margin-top:6px;font-weight:800}.modal{position:fixed;inset:0;background:rgba(23,32,51,.55);display:none;align-items:center;justify-content:center;padding:22px;z-index:20}.modal.open{display:flex}.modalbox{background:#fff;width:min(1100px,96vw);max-height:90vh;overflow:auto;border-radius:28px;padding:28px;box-shadow:0 40px 100px rgba(0,0,0,.25)}input,select,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:12px;font:inherit}.formgrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.secret{font-family:ui-monospace,monospace;background:#f8fafc;border:1px solid #e5e7eb;border-radius:12px;padding:10px}.mobile{display:none}@media(max-width:900px){.app{grid-template-columns:1fr}.side{position:relative;height:auto}.kpis,.two,.three{grid-template-columns:1fr}.mobile{display:block}}
</style>
</head>
<body>
<div class="app">
<aside class="side">
  <div class="brand"><img src="/logo.png"><div><b>Companions of CPAS</b><div style="color:var(--muted);font-size:12px">Admin Platform</div></div></div>
  <nav class="nav" id="nav"></nav>
</aside>
<main class="main">
  <div class="top"><div><h1 id="title">Dashboard</h1><div class="pill">Live demo analytics · rescue operations hub</div></div><button class="btn" onclick="openCalendar()">Open Calendar</button></div>
  <section id="view"></section>
</main>
</div>

<div class="modal" id="calendarModal">
 <div class="modalbox">
  <div class="top"><h1>Content + Volunteer Calendar</h1><button class="btn secondary" onclick="closeCalendar()">Close</button></div>
  <div class="formgrid" style="margin-bottom:20px">
    <input placeholder="Event title / social post title">
    <select><option>Fundraiser</option><option>Volunteer Shift</option><option>Facebook Post</option><option>Instagram Post</option><option>YouTube Upload</option></select>
    <input type="datetime-local">
    <select><option>Invite Volunteers</option><option>Board Only</option><option>Public Event</option></select>
    <textarea placeholder="Content, caption, invite message, or post notes" style="grid-column:1/-1"></textarea>
    <button class="btn">Save / Schedule</button><button class="btn secondary">Generate with Agent Sam</button>
  </div>
  <div class="calendar" id="cal"></div>
 </div>
</div>

<script>
const routes=[
["/admin/dashboard","Dashboard"],["/admin/dashboard/animals","Animals"],["/admin/dashboard/analytics","Analytics"],["/admin/dashboard/fundraising","Fundraising"],["/admin/dashboard/team","Team"],["/admin/dashboard/applications","Applications"],["/admin/dashboard/media","Media"],["/admin/dashboard/website","Website"],["/admin/dashboard/settings","Settings"]];
const nav=document.getElementById("nav"), path=location.pathname;
nav.innerHTML=routes.map(r=>`<a class="${path===r[0]?'active':''}" href="${r[0]}">${r[1]}</a>`).join("");
const title=document.getElementById("title"), view=document.getElementById("view");
function bars(vals){return `<div class="chart">${vals.map(v=>`<div class="bar" style="height:${v}%"></div>`).join("")}</div>`}
function kpis(){return `<div class="grid kpis">
<div class="card kpi"><b>24</b><span>Total Animals</span></div><div class="card kpi"><b>$3,840</b><span>Monthly Donations</span></div><div class="card kpi"><b>11</b><span>Applications</span></div><div class="card kpi"><b>7</b><span>Volunteer Tasks</span></div></div>`}
const pages={
Dashboard:`${kpis()}<br><div class="grid two"><div class="card"><h2>Donation Momentum</h2>${bars([35,48,42,65,72,55,86,78,92])}</div><div class="card"><h2>Recent Activity</h2>${["Application received · Rocky","Donation · $150","Volunteer invite sent","Instagram post scheduled","Receipt emailed"].map(x=>`<div class=row><b>${x}</b><span class=tag>live</span></div>`).join("")}</div></div>`,
Animals:`${kpis()}<br><div class="grid two"><div class="card"><h2>Animals by Status</h2>${bars([80,62,28,12])}</div><div class="card"><h2>Care Snapshot</h2><div class=row><b>Available</b><span class=tag>16</span></div><div class=row><b>Foster needed</b><span class=tag>5</span></div><div class=row><b>Medical watch</b><span class=tag>3</span></div></div></div>`,
Analytics:`<div class="grid three"><div class=card><h2>Applications</h2>${bars([30,50,35,75,62])}</div><div class=card><h2>Donations</h2>${bars([45,65,38,90,70])}</div><div class=card><h2>Social Reach</h2>${bars([20,35,72,58,84])}</div></div>`,
Fundraising:`<div class="grid two"><div class=card><h2>Campaigns</h2><table class=table><tr><th>Campaign</th><th>Goal</th><th>Raised</th></tr><tr><td>Emergency Medical Fund</td><td>$3,000</td><td>$1,240</td></tr><tr><td>Feed the Shelter</td><td>$1,500</td><td>$820</td></tr></table></div><div class=card><h2>Create Campaign</h2><input placeholder="Campaign title"><br><br><textarea placeholder="Story / goal"></textarea><br><br><button class=btn>Generate + Publish</button></div></div>`,
Team:`<div class=card><h2>Volunteers + Board</h2><table class=table><tr><th>Name</th><th>Role</th><th>Status</th><th>Email</th></tr><tr><td>Sam Primeaux</td><td>Developer</td><td><span class=tag>Active</span></td><td>meauxbility@gmail.com</td></tr><tr><td>Krystal Leboeuf</td><td>Admin</td><td><span class=tag>Active</span></td><td>keleboeuf26@gmail.com</td></tr><tr><td>Lori S.</td><td>Owner</td><td><span class=tag>Active</span></td><td>ljmusland@gmail.com</td></tr></table></div>`,
Applications:`<div class=card><h2>Applications Pipeline</h2><table class=table><tr><th>Applicant</th><th>Animal</th><th>Status</th><th>Action</th></tr><tr><td>David Champagne</td><td>Rocky</td><td><span class=tag>Submitted</span></td><td><button class=btn>Review</button></td></tr><tr><td>Sherri Mercier</td><td>General</td><td><span class=tag>Follow Up</span></td><td><button class=btn>Assign</button></td></tr></table></div>`,
Media:`<div class="grid three"><div class=card><h2>Image Library</h2><p>Upload animal photos, event flyers, campaign images.</p><button class=btn>Upload</button></div><div class=card><h2>Social Drafts</h2><p>Facebook, Instagram, YouTube content queue.</p><button class=btn>Schedule Post</button></div><div class=card><h2>Agent Sam</h2><p>Generate captions, fundraiser copy, and email blasts.</p><button class=btn>Open Tools</button></div></div>`,
Website:`<div class=card><h2>Website Editor</h2><p>Edit homepage, adoption content, donation blocks, success stories, and FAQ sections.</p><button class=btn>Preview Site</button> <button class="btn secondary">Publish Changes</button></div>`,
Settings:`<div class="grid two"><div class=card><h2>Password Management</h2><p>Users can reset only their own password. Owners can invite/disable users.</p><input placeholder="Current password"><br><br><input placeholder="New password"><br><br><button class=btn>Update Password</button></div><div class=card><h2>Secrets Vault</h2><p>Secrets are masked. Users can rotate only secrets scoped to them.</p><div class=secret>RESEND_API_KEY · re_••••••••••</div><br><div class=secret>STRIPE_SECRET_KEY · sk_••••••••••</div><br><div class=secret>AGENTSAM_BRIDGE_TOKEN · ••••••••••</div></div></div>`
};
let key=routes.find(r=>path===r[0])?.[1]||"Dashboard";title.textContent=key;view.innerHTML=pages[key];
function openCalendar(){document.getElementById("calendarModal").classList.add("open");}
function closeCalendar(){document.getElementById("calendarModal").classList.remove("open");}
document.getElementById("cal").innerHTML=Array.from({length:35},(_,i)=>`<div class=day><b>${i+1}</b>${[3,8,14,21,29].includes(i+1)?'<div class=event>Post / Event</div>':''}</div>`).join("");
</script>
</body>
</html>
